site_name: brnrd docs
site_url: https://gurio.github.io/brr/
repo_url: https://github.com/Gurio/brr
repo_name: Gurio/brr
edit_uri: edit/main/docs/docs/
site_description: >-
  brnrd — local coding agents, reachable from anywhere, with continuity
  across runs.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.action.edit
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting started:
      - 1. Install: getting-started/install.md
      - 2. Connect: getting-started/connect.md
      - 3. First task: getting-started/first-task.md
  - Concepts:
      - The resident: concepts/resident.md
      - Runs & environments: concepts/environments.md
      - Gates & authorization: concepts/gates.md
  - Guides:
      - Models & quota: guides/models.md
      - Troubleshooting: guides/troubleshooting.md
  - Security & privacy: security.md
  - Self-hosting brnrd: self-hosting/index.md
  - Reference:
      - CLI: reference/cli.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Gurio/brr
