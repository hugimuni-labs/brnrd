# Upsun config for the brnrd backend (the managed inbox service).
# The brr daemon runs on your own machine and dials out to this — only
# brnrd is deployed here. Reference:
# https://docs.upsun.com/create-apps/app-reference/single-runtime-image.html
applications:
  brnrd:
    # The whole repo is the build context; brnrd lives under src/.
    source:
      root: "/"

    type: "python:3.12"

    # Node/npm are only needed to build the SvelteKit static frontend
    # (src/frontend) during the build hook below; the running app stays
    # pure Python/uvicorn. This is the standard Platform.sh/Upsun trick
    # for pulling in a second language toolchain for a build-only step.
    dependencies:
      nodejs:
        npm: "*"

    # Expose the PostgreSQL service to the app. Upsun publishes its
    # credentials as POSTGRESQL_* env vars (consumed in .environment).
    relationships:
      postgresql: "postgresql:postgresql"

    web:
      commands:
        # ASGI factory; reads its config (incl. BRNRD_DATABASE_URL) from
        # the environment. Listens on the TCP port Upsun provides.
        start: "uvicorn brnrd:create_app --factory --host 0.0.0.0 --port $PORT"
      upstream:
        socket_family: tcp
      locations:
        # The SvelteKit build (src/frontend, adapter-static) now serves
        # "/" directly instead of previewing under "/app/" (maintainer
        # call, 2026-07-06 — the earlier caution about clobbering the
        # working login/repos/connect flows still applies, so every
        # backend route the app actually serves is passthru'd below
        # rather than silently dropped). Static assets first, FastAPI for
        # anything the build doesn't own.
        "/":
          root: "src/frontend/build"
          index: ["index.html"]
          # SPA fallback: the frontend is adapter-static with
          # `fallback: 'index.html'` (vite.config.ts) — client-side routes
          # like /activity have no per-path file in build/, so any request
          # the rules below don't claim serves the SPA shell and the
          # router takes it from there. (#327: first client route beyond
          # "/", the ported activity feed.)
          passthru: "/index.html"
          scripts: false
          rules:
            # brnrd_web's remaining HTML routes (oauth and approval
            # flows) plus every JSON/API/webhook surface
            # (src/brnrd/routers/*) and the legacy dashboard's own static
            # assets. Keep this list in sync with src/brnrd/app.py's
            # include_router calls and src/brnrd_web/routes.py/
            # activity_dashboard.py — anything added there needs a
            # passthru rule here or it never reaches FastAPI. /activity,
            # /repos and /login deliberately absent: SPA-owned now (#327).
            # /plans stays passthru'd so old bookmarks hit the backend's
            # 308 → "/" (#326) instead of the SPA's 404. /logout stays
            # backend-owned (it must clear the session cookie).
            '^/(v1|api|r|logout|auth|connect|plans|static|terms/accept|config-approve)(/|$)':
              passthru: true

    variables:
      env:
        # Disable the dev enqueue stand-in in production; the real
        # producer is POST /v1/webhooks/telegram. Secrets (bot token,
        # webhook secret) are set out-of-band via `upsun variable:create`.
        BRNRD_ENABLE_DEV: "0"

    hooks:
      build: |
        set -eux
        pip install --upgrade pip
        pip install ".[backend,postgres]"
        cd src/frontend
        # `npm ci` demands byte-exact lock/registry agreement; several
        # frontend deps (rolldown/tailwindcss oxide) ship optional
        # per-platform native/wasm binaries whose own nested ranges (e.g.
        # @emnapi/core) get satisfied by whatever patch the registry has
        # live that day, so a lock resolved on one npm/date can disagree
        # with `ci`'s sync check on another even with unchanged
        # package.json (hit live 2026-07-06: local npm resolved
        # @emnapi/core@1.11.1, Upsun's npm ci wanted 1.11.2 — same lock,
        # same registry, different day). `npm install` self-heals that
        # drift instead of hard-failing the build over it.
        npm install --no-audit --no-fund
        npm run build
        cd -

    # No mounts: all state lives in PostgreSQL; nothing writes to disk.

services:
  postgresql:
    type: postgresql:15

routes:
  "https://{default}/":
    type: upstream
    upstream: "brnrd:http"
