{% extends "base.html" %}

{% block body %}
<main class="state-shell" aria-labelledby="connect-title">
  <header class="flow-lockup" aria-label="brnrd">
    <a class="flow-wordmark" href="/">brnrd</a>
    <span class="flow-context">local daemon / cloud account</span>
  </header>
  <section class="panel connect-panel">
    <p class="eyebrow">pairing handshake</p>
    <h1 id="connect-title">Approve this daemon</h1>
    <p class="panel-copy">Bind pair code <code>{{ code }}</code> to one of your repositories.</p>

    <form class="stack-form" method="post" action="/connect/{{ code }}">
      <label for="repo_id">repository</label>
      <select id="repo_id" name="repo_id">
        {% for repo in repos %}
          <option value="{{ repo.id }}">{{ repo.repo_full_name }}</option>
        {% endfor %}
      </select>
      <button class="button button-primary" type="submit">approve daemon</button>
    </form>
  </section>
</main>
{% endblock %}
