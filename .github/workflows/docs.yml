name: Build and deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

# Only the deploy job may publish; a PR build has no business holding a
# pages-write token.
concurrency:
  # Deploys to one Pages site must serialize, but PR builds are independent —
  # sharing one group would let a docs PR queue in front of a main deploy.
  group: pages-${{ github.event_name == 'push' && 'deploy' || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - name: Install documentation dependencies
        run: python -m pip install -r docs/requirements.txt
      - name: Build documentation
        run: mkdocs build --strict -f docs/mkdocs.yml
      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
