name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      # Both green on main since #530 (the lint hygiene pass) — safe to gate.
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: |
          npx svelte-kit sync
          npm run check

  launcher:
    name: npm launcher package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packaging/npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Parse the launcher
        run: node --check bin/brnrd.js
      # The release job publishes this tarball with no rehearsal. Pack it on
      # every PR so a manifest or missing-file break surfaces here, not at the
      # one moment the version number can no longer be reused. `npm pack`, not
      # `npm publish --dry-run`: the latter asks the registry and fails on the
      # already-published version, which is the normal state between releases.
      - name: Pack the tarball the release would publish
        run: npm pack --dry-run
